          const makeShareCard = () => {
            const W = 1080;
            const H = 1680;
            const canvas = document.createElement('canvas');
            canvas.width = W;
            canvas.height = H;
            const ctx = canvas.getContext('2d');
            const cs = getComputedStyle(document.documentElement);
            const brand = (cs.getPropertyValue('--gold') || '#d31145').trim();
            const brandDim = (cs.getPropertyValue('--gold-dim') || '#a50e36').trim();
            const text = (cs.getPropertyValue('--text') || '#1d1d1f').trim();
            const textDim = (cs.getPropertyValue('--text-dim') || '#6b7280').trim();
            const theme = document.documentElement.getAttribute('data-theme') || 'aia';
            const isAia = theme !== 'classic';

            // background
            const bg = ctx.createLinearGradient(0, 0, W, H);
            if (isAia) {
              bg.addColorStop(0, '#ffffff');
              bg.addColorStop(0.55, '#f7f7f8');
              bg.addColorStop(1, '#f0f1f3');
            } else {
              bg.addColorStop(0, '#0b0f1a');
              bg.addColorStop(0.45, '#121a2e');
              bg.addColorStop(1, '#0a1628');
            }
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, W, H);

            // glow orbs
            const orb = (x, y, r, c) => {
              const g = ctx.createRadialGradient(x, y, 0, x, y, r);
              g.addColorStop(0, c);
              g.addColorStop(1, 'rgba(0,0,0,0)');
              ctx.fillStyle = g;
              ctx.beginPath();
              ctx.arc(x, y, r, 0, Math.PI * 2);
              ctx.fill();
            };
            if (isAia) {
              orb(200, 180, 340, 'rgba(211,17,69,0.12)');
              orb(900, 500, 360, 'rgba(29,29,31,0.06)');
              orb(540, 1480, 380, 'rgba(15,118,110,0.08)');
            } else {
              orb(180, 160, 320, 'rgba(245,197,24,0.18)');
              orb(920, 420, 380, 'rgba(0,212,255,0.12)');
              orb(540, 1500, 400, 'rgba(16,185,129,0.10)');
            }

            // top accent bar
            const bar = ctx.createLinearGradient(80, 0, W - 80, 0);
            bar.addColorStop(0, brand);
            bar.addColorStop(1, brandDim);
            ctx.fillStyle = bar;
            ctx.fillRect(80, 56, W - 160, 6);

            // helper text wrap (Thai-friendly: by char)
            const wrap = (text, maxW, font) => {
              ctx.font = font;
              const lines = [];
              let line = '';
              const chars = String(text || '').split('');
              for (const ch of chars) {
                const t = line + ch;
                if (ctx.measureText(t).width > maxW && line) {
                  lines.push(line);
                  line = ch;
                } else line = t;
              }
              if (line) lines.push(line);
              return lines;
            };
            const drawLines = (lines, x, y, lh, color, font, align) => {
              ctx.fillStyle = color;
              ctx.font = font;
              ctx.textAlign = align || 'left';
              lines.forEach((ln, i) => ctx.fillText(ln, x, y + i * lh));
              return lines.length * lh;
            };
            const roundRect = (x, y, w, h, r) => {
              ctx.beginPath();
              ctx.moveTo(x + r, y);
              ctx.arcTo(x + w, y, x + w, y + h, r);
              ctx.arcTo(x + w, y + h, x, y + h, r);
              ctx.arcTo(x, y + h, x, y, r);
              ctx.arcTo(x, y, x + w, y, r);
              ctx.closePath();
            };

            // header
            ctx.textAlign = 'left';
            ctx.fillStyle = brand;
            ctx.font = '700 28px "Noto Sans Thai", "Sarabun", sans-serif';
            ctx.fillText('นักวิเคราะห์แผน AI', 80, 120);
            ctx.fillStyle = text;
            ctx.font = '800 56px "Noto Sans Thai", "Sarabun", sans-serif';
            ctx.fillText('สรุปแผนชีวิตของคุณ', 80, 190);
            ctx.fillStyle = textDim;
            ctx.font = '400 26px "Noto Sans Thai", "Sarabun", sans-serif';
            ctx.fillText('อายุ ' + a.age + ' ปี  ·  เกษียณ ' + a.retireAge + '  ·  ใช้ ' + fmt(a.monthlySpend) + ' บาท/เดือน', 80, 240);

            // priority card
            let y = 290;
            roundRect(80, y, W - 160, 280, 28);
            const pc = ctx.createLinearGradient(80, y, W - 80, y + 280);
            if (isAia) {
              pc.addColorStop(0, 'rgba(211,17,69,0.10)');
              pc.addColorStop(1, 'rgba(29,29,31,0.04)');
            } else {
              pc.addColorStop(0, 'rgba(239,68,68,0.22)');
              pc.addColorStop(1, 'rgba(245,197,24,0.14)');
            }
            ctx.fillStyle = pc;
            ctx.fill();
            ctx.strokeStyle = isAia ? 'rgba(211,17,69,0.35)' : 'rgba(245,197,24,0.45)';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = brand;
            ctx.font = '700 24px "Noto Sans Thai", "Sarabun", sans-serif';
            ctx.fillText('ตรงที่ควรดูก่อน', 110, y + 50);
            const titleLines = wrap(plan.title, W - 220, '800 40px "Noto Sans Thai", "Sarabun", sans-serif');
            drawLines(titleLines, 110, y + 105, 48, text, '800 40px "Noto Sans Thai", "Sarabun", sans-serif');
            const gapLines = wrap(plan.gap, W - 220, '600 28px "Noto Sans Thai", "Sarabun", sans-serif');
            drawLines(gapLines, 110, y + 105 + titleLines.length * 48 + 16, 36, brand, '600 28px "Noto Sans Thai", "Sarabun", sans-serif');

            // metrics
            y = 610;
            const metrics = [
              { l: 'ช่องว่างเกษียณ', v: fmtM(retireGap) },
              { l: 'เงินฉุกเฉินขาด', v: fmtM(efGap) },
              { l: 'ความเสี่ยงหลัก', v: riskText }
            ];
            const mw = (W - 160 - 24) / 3;
            metrics.forEach((m, i) => {
              const x = 80 + i * (mw + 12);
              roundRect(x, y, mw, 150, 20);
              ctx.fillStyle = isAia ? '#ffffff' : 'rgba(255,255,255,0.06)';
              ctx.fill();
              ctx.strokeStyle = isAia ? 'rgba(29,29,31,0.10)' : 'rgba(255,255,255,0.12)';
              ctx.lineWidth = 1.5;
              ctx.stroke();
              ctx.fillStyle = textDim;
              ctx.font = '600 22px "Noto Sans Thai", "Sarabun", sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText(m.l, x + mw / 2, y + 48);
              const vLines = wrap(m.v, mw - 28, '800 28px "Noto Sans Thai", "Sarabun", sans-serif');
              drawLines(vLines.slice(0, 2), x + mw / 2, y + 95, 34, brand, '800 28px "Noto Sans Thai", "Sarabun", sans-serif', 'center');
            });
            ctx.textAlign = 'left';

            // steps
            y = 800;
            const stepColor = isAia ? '#0f766e' : '#6ee7b7';
            ctx.fillStyle = stepColor;
            ctx.font = '700 28px "Noto Sans Thai", "Sarabun", sans-serif';
            ctx.fillText('ทำต่อยังไง', 80, y);
            y += 30;
            plan.steps.forEach((step, i) => {
              y += 28;
              roundRect(80, y, W - 160, 120, 20);
              ctx.fillStyle = isAia ? 'rgba(15,118,110,0.07)' : 'rgba(16,185,129,0.10)';
              ctx.fill();
              ctx.strokeStyle = isAia ? 'rgba(15,118,110,0.25)' : 'rgba(16,185,129,0.28)';
              ctx.lineWidth = 1.5;
              ctx.stroke();
              ctx.beginPath();
              ctx.arc(120, y + 60, 26, 0, Math.PI * 2);
              ctx.fillStyle = isAia ? 'rgba(15,118,110,0.18)' : 'rgba(16,185,129,0.35)';
              ctx.fill();
              ctx.fillStyle = stepColor;
              ctx.font = '800 26px "Noto Sans Thai", "Sarabun", sans-serif';
              ctx.textAlign = 'center';
              ctx.fillText(String(i + 1), 120, y + 70);
              ctx.textAlign = 'left';
              const sLines = wrap(step, W - 280, '500 28px "Noto Sans Thai", "Sarabun", sans-serif');
              drawLines(sLines.slice(0, 2), 170, y + 48, 36, text, '500 28px "Noto Sans Thai", "Sarabun", sans-serif');
              y += 120;
            });

            // path chosen
            y += 36;
            ctx.fillStyle = textDim;
            ctx.font = '500 24px "Noto Sans Thai", "Sarabun", sans-serif';
            ctx.fillText('ทางที่คุณเลือก: ' + pathLabelOf(), 80, y);

            // footer
            ctx.fillStyle = isAia ? 'rgba(29,29,31,0.08)' : 'rgba(255,255,255,0.08)';
            ctx.fillRect(80, H - 140, W - 160, 2);
            ctx.fillStyle = textDim;
            ctx.font = '500 24px "Noto Sans Thai", "Sarabun", sans-serif';
            ctx.fillText('เก็บไว้ทบทวนเอง · ไม่ต้องส่งหาใคร', 80, H - 80);
            const d = new Date();
            ctx.fillStyle = textDim;
            ctx.font = '400 22px "Noto Sans Thai", "Sarabun", sans-serif';
            ctx.fillText(d.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' }), 80, H - 40);

            const dataUrlToBlob = (dataUrl) => {
              const parts = String(dataUrl || '').split(',');
              const mime = (parts[0].match(/:(.*?);/) || [])[1] || 'image/png';
              const bin = atob(parts[1] || '');
              const arr = new Uint8Array(bin.length);
              for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
              return new Blob([arr], { type: mime });
            };

            /** canvas → Blob แบบทนทาน (toBlob บาง WebView คืน null) */
            const canvasToBlob = (canvas) => new Promise((resolve) => {
              const fallback = () => {
                try { resolve(dataUrlToBlob(canvas.toDataURL('image/png'))); }
                catch (_) { resolve(null); }
              };
              if (!canvas) return resolve(null);
              if (typeof canvas.toBlob === 'function') {
                try {
                  canvas.toBlob((blob) => {
                    if (blob && blob.size > 0) resolve(blob);
                    else fallback();
                  }, 'image/png');
                  return;
                } catch (_) { /* fall through */ }
              }
              fallback();
            });

            return canvasToBlob(canvas).then((blob) => ({ canvas, blob }));
          };

          const wireSummary = () => {
            hideBottom();
            setTimeout(animatePyramid, 200);
            state.answers.nextPath = 'fix';
            state.answers.priorityId = plan.id;
            document.querySelectorAll('#pathChips .path-chip').forEach(btn => {
              btn.onclick = () => {
                document.querySelectorAll('#pathChips .path-chip').forEach(x => x.classList.remove('selected'));
                btn.classList.add('selected');
                state.answers.nextPath = btn.dataset.path;
              };
            });
            const statusEl = document.getElementById('shareStatus');
            const setStatus = (t, ok = true) => {
              if (!statusEl) return;
              statusEl.style.color = ok ? 'var(--success)' : '#fca5a5';
              statusEl.textContent = t;
            };
            const previewWrap = document.getElementById('sharePreviewWrap');
            const preview = document.getElementById('sharePreview');
            const CARD_FILE = 'life-plan-summary.png';

            const isIOS = () => {
              const ua = navigator.userAgent || '';
              if (/iPad|iPhone|iPod/i.test(ua)) return true;
              // iPadOS 13+ รายงานเป็น Mac
              return navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1;
            };
            const isAndroid = () => /Android/i.test(navigator.userAgent || '');
            const isMobile = () => isIOS() || isAndroid() || /Mobile/i.test(navigator.userAgent || '');

            const showPreview = (canvas, blob) => {
              if (!preview || !previewWrap) return;
              try {
                if (blob) {
                  const url = URL.createObjectURL(blob);
                  preview.src = url;
                  preview.onload = () => setTimeout(() => URL.revokeObjectURL(url), 60000);
                } else if (canvas) {
                  preview.src = canvas.toDataURL('image/png');
                }
                previewWrap.style.display = 'block';
                previewWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
              } catch (_) {}
            };

            const makeCardFile = (blob) => {
              try {
                return new File([blob], CARD_FILE, { type: 'image/png', lastModified: Date.now() });
              } catch (_) {
                // IE/เก่ามาก: File ctor ไม่มี — ใช้ Blob + name ผ่าน share ไม่ได้ แต่ download ได้
                blob.name = CARD_FILE;
                return blob;
              }
            };

            /** ดาวน์โหลดหลายวิธี — Android / desktop ใช้ได้ดี · iOS มักต้อง share หรือ long-press */
            const downloadBlob = (blob, name) => {
              if (!blob) return false;
              const fileName = name || CARD_FILE;
              // IE / legacy Edge
              if (typeof navigator.msSaveOrOpenBlob === 'function') {
                try {
                  navigator.msSaveOrOpenBlob(blob, fileName);
                  return true;
                } catch (_) {}
              }
              // วิธีหลัก: object URL + a[download]
              try {
                const url = URL.createObjectURL(blob);
                const aEl = document.createElement('a');
                aEl.href = url;
                aEl.download = fileName;
                aEl.rel = 'noopener';
                aEl.style.display = 'none';
                document.body.appendChild(aEl);
                aEl.click();
                aEl.remove();
                setTimeout(() => URL.revokeObjectURL(url), 4000);
                return true;
              } catch (_) {}
              // WebView บางตัวบล็อก blob: — ลอง data URL
              try {
                const reader = new FileReader();
                reader.onload = () => {
                  const aEl = document.createElement('a');
                  aEl.href = reader.result;
                  aEl.download = fileName;
                  aEl.rel = 'noopener';
                  document.body.appendChild(aEl);
                  aEl.click();
                  aEl.remove();
                };
                reader.readAsDataURL(blob);
                return true;
              } catch (_) {}
              return false;
            };

            /** เปิดรูปในแท็บใหม่ (iOS Safari: แล้วให้ user กดแชร์/บันทึกรูป) */
            const openBlobInNewTab = (blob) => {
              if (!blob) return false;
              try {
                const url = URL.createObjectURL(blob);
                const win = window.open(url, '_blank');
                if (!win) {
                  // popup ถูกบล็อก — นำทางในแท็บเดียวกันไม่ดี ใช้ preview แทน
                  URL.revokeObjectURL(url);
                  return false;
                }
                setTimeout(() => URL.revokeObjectURL(url), 60000);
                return true;
              } catch (_) {
                return false;
              }
            };

            const copyText = async (text) => {
              // 1) Clipboard API (ต้อง secure context)
              try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                  await navigator.clipboard.writeText(text);
                  return true;
                }
              } catch (_) {}
              // 2) execCommand fallback — ใช้ได้ใน WebView หลายตัว
              try {
                const ta = document.createElement('textarea');
                ta.value = text;
                ta.setAttribute('readonly', '');
                ta.style.cssText = 'position:fixed;left:-9999px;top:0;opacity:0;';
                document.body.appendChild(ta);
                ta.focus();
                ta.select();
                ta.setSelectionRange(0, ta.value.length);
                const ok = document.execCommand('copy');
                ta.remove();
                return !!ok;
              } catch (_) {
                return false;
              }
            };

            /**
             * แชร์ไฟล์รูป — ลอง share จริงเสมอ
             * (canShare บน Android บางรุ่นคืน false ทั้งที่แชร์ได้ · ชื่อไฟล์ไทยก็เคยพัง)
             * คืน: 'shared' | 'abort' | 'fail'
             */
            const shareFiles = async (blob, text) => {
              if (!blob || typeof navigator.share !== 'function') return 'fail';
              const file = makeCardFile(blob);
              const attempts = [
                { files: [file], title: 'สรุปแผนชีวิตของฉัน', text: text || '' },
                { files: [file], title: 'สรุปแผนชีวิตของฉัน' },
                { files: [file] }
              ];
              for (const payload of attempts) {
                try {
                  await navigator.share(payload);
                  return 'shared';
                } catch (e) {
                  if (e && e.name === 'AbortError') return 'abort';
                  // ลอง payload ถัดไป
                }
              }
              return 'fail';
            };

            const shareTextOnly = async (text) => {
              if (typeof navigator.share !== 'function') return 'fail';
              try {
                await navigator.share({ title: 'สรุปแผนชีวิตของฉัน', text });
                return 'shared';
              } catch (e) {
                if (e && e.name === 'AbortError') return 'abort';
                return 'fail';
              }
            };

            /**
             * บันทึกรูปให้ใช้ได้ทั้ง iOS + Android
             * - iOS: เปิด Share Sheet (เลือก "บันทึกรูป") ดีที่สุด · fallback โชว์ preview ให้กดค้าง
             * - Android: download + share sheet ถ้ามี
             */
            const saveCardBtn = document.getElementById('saveCardBtn');
            if (saveCardBtn) {
              saveCardBtn.onclick = async () => {
                setStatus('กำลังสร้างการ์ด...');
                try {
                  const { canvas, blob } = await makeShareCard();
                  if (!blob) throw new Error('no blob');
                  showPreview(canvas, blob);

                  // มือถือ: ใช้ Web Share บันทึกรูป (iOS Photos / Android Files)
                  if (isMobile() && typeof navigator.share === 'function') {
                    const r = await shareFiles(blob, 'สรุปแผนชีวิตของฉัน');
                    if (r === 'shared') {
                      setStatus(isIOS()
                        ? 'เปิดแชร์แล้ว · เลือก «บันทึกรูป» เพื่อเก็บลงเครื่อง'
                        : 'เปิดแชร์แล้ว · เลือกบันทึกหรือส่งต่อได้เลย');
                      return;
                    }
                    if (r === 'abort') {
                      setStatus('ยกเลิกแล้ว · กดค้างที่รูปด้านบนเพื่อบันทึกก็ได้');
                      return;
                    }
                  }

                  // ดาวน์โหลดตรง (Android Chrome / desktop ใช้ได้ดี)
                  const dlOk = downloadBlob(blob, CARD_FILE);
                  if (dlOk && !isIOS()) {
                    setStatus('บันทึกรูปแล้ว · ดูในโฟลเดอร์ดาวน์โหลดได้เลย');
                    return;
                  }

                  // iOS / WebView: a[download] มักไม่ทำงาน — เปิดแท็บรูป + บอก long-press
                  if (isIOS()) {
                    const opened = openBlobInNewTab(blob);
                    setStatus(opened
                      ? 'เปิดรูปแล้ว · กดปุ่มแชร์ (□↑) แล้วเลือก «บันทึกรูป» หรือกดค้างที่รูปด้านบน'
                      : 'กดค้างที่รูปด้านบนค้างไว้ · แล้วเลือก «บันทึกรูป»');
                    return;
                  }

                  setStatus(dlOk
                    ? 'บันทึกรูปแล้ว · ถ้าไม่เจอไฟล์ ให้กดค้างที่รูปด้านบน'
                    : 'กดค้างที่รูปด้านบน · แล้วเลือกบันทึกรูป');
                } catch (_) {
                  setStatus('สร้างรูปไม่สำเร็จ · ลองแชร์ข้อความแทน', false);
                }
              };
            }

            const shareBtn = document.getElementById('shareBtn');
            if (shareBtn) {
              shareBtn.onclick = async () => {
                setStatus('กำลังเตรียมแชร์...');
                const text = buildShareText();
                try {
                  const { canvas, blob } = await makeShareCard();
                  if (canvas || blob) showPreview(canvas, blob);

                  // 1) แชร์รูป + ข้อความ (iOS 15+ / Android Chrome)
                  if (blob) {
                    const r = await shareFiles(blob, text);
                    if (r === 'shared') {
                      setStatus('แชร์รูปเรียบร้อยแล้ว');
                      return;
                    }
                    if (r === 'abort') {
                      setStatus('');
                      return;
                    }
                  }

                  // 2) แชร์ข้อความอย่างเดียว
                  const t = await shareTextOnly(text);
                  if (t === 'shared') {
                    setStatus('แชร์ข้อความเรียบร้อยแล้ว · รูปอยู่ด้านบน กดค้างเพื่อบันทึกได้');
                    return;
                  }
                  if (t === 'abort') {
                    setStatus('');
                    return;
                  }

                  // 3) ไม่มี Web Share (Messenger in-app บางตัว) → ดาวน์โหลด + คัดลอกข้อความ
                  if (blob) downloadBlob(blob, CARD_FILE);
                  const copied = await copyText(text);
                  if (copied) {
                    setStatus(isIOS()
                      ? 'คัดลอกข้อความแล้ว · กดค้างที่รูปด้านบนเพื่อบันทึกรูป'
                      : 'คัดลอกข้อความแล้ว และพยายามบันทึกรูปให้แล้ว');
                    return;
                  }
                  if (blob) {
                    setStatus('รูปอยู่ด้านบน · กดค้างเพื่อบันทึก หรือคัดลอกข้อความด้านล่างด้วยตัวเอง');
                    return;
                  }
                } catch (e) {
                  if (e && e.name === 'AbortError') {
                    setStatus('');
                    return;
                  }
                }
                // 4) fallback สุดท้าย: คัดลอกข้อความ
                try {
                  const text = buildShareText();
                  if (await copyText(text)) {
                    setStatus('คัดลอกข้อความสรุปไว้แล้ว · วางใน Line/โน้ตได้');
                    return;
                  }
                } catch (_) {}
                setStatus('แชร์ไม่สำเร็จ · กดค้างที่รูปด้านบนเพื่อบันทึก หรือกดบันทึกรูปอีกครั้ง', false);
              };
            }

            const restart = document.getElementById('restartBtn');
            if (restart) {
              restart.onclick = () => {
                stopSpeak();
                state.step = 0;
                state.introPlayed = false;
                state.stepHeard = {};
                state.answers = {
                  age: 35, retireAge: 60, monthlySpend: 30000, prepared: 0,
                  careParents: null, hasSpouse: null, kids: 0, kidsAges: [],
                  eduGoal: 'bachelor', goals: [], risks: [], monthlyExpense: 50000,
                  efAmount: 0, hasHealth: null, hasLife: null, hasCI: null,
                  hasAccident: null, riskTol: 'medium', topWorry: null
                };
                goTo(0);
              };
            }
          };

          gateStepWithClip(10, {
            nextLabel: 'ดูสรุปผล',
            onNext: () => { hideBottom(); },
            wireActions: wireSummary
          });
        }
      },

      // Extra steps for deep dive if needed, but 10 is good. Add more if time.
      // We stop at 10 for flow, TOTAL was approx.
    ];

    // Adjust total for progress
    // Actually steps.length is 11 (0-10)
    // In code I set 12, but ok approximate.

    function goTo(n) {
      stopSpeak();
      state._stepReveal = null;
      state._stepRevealStep = null;
      state.step = n;
      if (n >= steps.length) n = steps.length - 1;
      hideBottom();
      showZonePlay(false);
      showAvatarPlay(false);
      content.style.opacity = '0';
      setTimeout(() => {
        steps[n].render();
        content.style.opacity = '1';
        // ขั้นที่มีคลิปจะ play เองใน render
        if (!STEP_CLIPS[n]) ensureAvatarPlaying();
        // DEV: ข้ามการบังคับฟัง — ปลด next + เงียบคลิป
        if (DEV_MODE) applyDevUnlock();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 150);
    }

    /** DEV only: ทำเครื่องหมายว่าฟังแล้ว + เงียบวิดีโอ + ปลดปุ่มไปต่อ */
    function applyDevUnlock() {
      if (!DEV_MODE) return;
      const s = state.step;
      if (s === 0) state.introPlayed = true;
      state.stepHeard[s] = true;
      stopSpeak();
      const av = document.getElementById('avatar');
      if (av && s > 0) startSilentLoop(av);
      showZonePlay(false);
      showAvatarPlay(false);

      const startBtn = document.getElementById('startBtn');
      if (startBtn && s === 0) {
        startBtn.disabled = false;
        startBtn.textContent = 'เริ่มดูกัน 🚀 (dev ข้ามได้)';
        startBtn.onclick = () => goTo(1);
      }

      // โชว์ actions ที่ซ่อนไว้ + ปลดปุ่มล่าง
      setStepActionsVisible(true);
      if (s > 0 && s < steps.length - 1) {
        const labels = {
          1: 'ต่อไป · เป้าหมายเกษียณ',
          2: 'คำนวณเงินที่ต้องเตรียม',
          3: 'ต่อไป · ครอบครัว',
          4: 'ต่อไป · เป้าหมายชีวิต',
          5: 'ต่อไป · ความเสี่ยง',
          6: 'ดูพีระมิดการเงิน',
          7: 'คำนวณเงินสำรอง',
          8: 'ต่อไป · ออม & ลงทุน',
          9: 'ดูสรุปแผนชีวิต',
        };
        showBottom(labels[s] || 'ไปต่อ →', () => {
          stopSpeak();
          goTo(s + 1);
        });
        btnNext.disabled = false;
        btnNext.classList.remove('waiting');
      }
    }

    function devGoNext() {
      if (!DEV_MODE) return;
      const s = state.step;
      applyDevUnlock();
      if (s >= steps.length - 1) return;
      goTo(s + 1);
    }

    // ===================== CONFETTI =====================
    function launchConfetti() {
      const c = document.getElementById('confetti');
      c.innerHTML = '';
      const theme = document.documentElement.getAttribute('data-theme') || 'aia';
      const colors = theme === 'classic'
        ? ['#f5c518', '#00d4ff', '#10b981', '#a78bfa', '#f472b6']
        : ['#d31145', '#1d1d1f', '#0f766e', '#9ca3af', '#f43f5e'];
      for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.style.cssText = `
          position:absolute; width:8px; height:8px; border-radius:2px;
          background:${colors[i%colors.length]};
          left:${Math.random()*100}%; top:-10px;
          opacity:1;
          transform:rotate(${Math.random()*360}deg);
          animation: confetti-fall ${2+Math.random()*2}s linear forwards;
        `;
        c.appendChild(p);
      }
      // inject keyframes once
      if (!document.getElementById('confettiStyle')) {
        const s = document.createElement('style');
        s.id = 'confettiStyle';
        s.textContent = `@keyframes confetti-fall { to { top: 110%; opacity: 0; transform: translateX(${Math.random()>0.5? '':'-'}80px) rotate(720deg); } }`;
        document.head.appendChild(s);
      }
      setTimeout(() => c.innerHTML = '', 4500);
    }

    // ===================== CONTROLS =====================
    document.getElementById('btnMute').onclick = () => {
      state.muted = !state.muted;
      const btn = document.getElementById('btnMute');
      btn.textContent = state.muted ? '🔇' : '🔊';
      btn.title = state.muted ? 'เปิดเสียงวิดีโอ' : 'ปิดเสียงวิดีโอ';
      if (state.muted) {
        stopSpeak();
        // กดปิดเสียงระหว่างเล่น (ทุกหน้า): คืนปุ่มเล่น กันค้าง "กำลังฟัง..."
        if (state.step === 0 && !state.introPlayed) {
          showAvatarPlay(true);
          setLandingCTA('ready');
        } else if (state.step > 0 && !state.stepHeard[state.step] && STEP_CLIPS[state.step]) {
          showZonePlay(true);
        }
      }
    };
    document.getElementById('btnSkip').onclick = () => {
      // หน้าแรก: ข้ามได้เฉพาะหลังฟังจบอย่างน้อย 1 รอบ
      if (state.step === 0) {
        if (!state.introPlayed) return;
        stopSpeak();
        goTo(1);
        return;
      }
      // ขั้น 1–10: ข้ามคลิป (หลังเคยฟังจบแล้ว) → ปลด actions + ปุ่มไปต่อ
      if (STEP_CLIPS[state.step]) {
        if (!state.stepHeard[state.step]) return;
        stopSpeak();
        startSilentLoop(document.getElementById('avatar'));
        if (
          typeof state._stepReveal === 'function' &&
          state._stepRevealStep === state.step
        ) {
          state._stepReveal();
        } else {
          state.stepHeard[state.step] = true;
          setStepActionsVisible(true);
          btnNext.disabled = false;
          btnNext.classList.remove('waiting');
        }
        return;
      }
      stopSpeak();
    };

    // บาง WebView (Messenger) pause คลิปเมื่อสลับแอป — กลับมาแล้วถ้าใกล้จบให้ปลดล็อก
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) return;
      const step = state.step;
      if (step === 0) {
        const v = document.getElementById('landingAvatar');
        if (v && state.speaking && isVideoNearEnd(v)) {
          // bindVideoEnd จะจับเองผ่าน poll/pause — แค่ nudge play ถ้าค้างกลางคลิป
          return;
        }
      }
      if (STEP_CLIPS[step] && state.speaking) {
        const av = document.getElementById('avatar');
        if (av && isVideoNearEnd(av)) {
          // poll ใน bindVideoEnd จะเรียก onDone — ไม่ต้องทำซ้ำ
          return;
        }
        // ถ้ายังไม่จบ แต่ถูก pause เพราะ background → เล่นต่อ
        if (av && av.paused && !av.ended && !state.muted && state.speaking) {
          av.play().catch(() => showZonePlay(true));
        }
      }
    });

    // DEV bar
    if (DEV_MODE) {
      document.getElementById('devBar').classList.add('show');
      document.getElementById('devNextBtn').onclick = devGoNext;
      document.title = '[DEV] ' + document.title;
    }

    // Theme: ใช้ AIA เป็นหลัก · ธีม classic ยังอยู่ใน CSS (กันเหนียว)
    // ถ้าต้องการกลับธีมเดิม: ใส่ ?theme=classic ใน URL ครั้งเดียว
    (function initTheme() {
      const root = document.documentElement;
      let theme = 'aia';
      try {
        const q = new URLSearchParams(location.search).get('theme');
        if (q === 'classic' || q === 'aia') {
          theme = q;
          localStorage.setItem('life-theme', theme);
        } else {
          const s = localStorage.getItem('life-theme');
          if (s === 'classic' || s === 'aia') theme = s;
        }
      } catch (_) {}
      root.setAttribute('data-theme', theme);
    })();

    // Start
    goTo(0);

    // Make content transition smooth
    content.style.transition = 'opacity 0.2s ease';
  </script>
</body>
</html>
