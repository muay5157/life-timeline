<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>แผนชีวิตของคุณ | คุยไป คลิกไป</title>
  <meta name="description" content="สำรวจแผนชีวิต + วิเคราะห์แผนแบบ interactive ง่ายๆ 5 นาที · นักวิเคราะห์แผน AI อธิบาย คุณเลือกคำตอบ" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ===== Theme: AIA (ค่าเริ่มต้น · น่าเชื่อถือ) ===== */
    :root,
    [data-theme="aia"] {
      --bg: #f3f4f6;
      --card: #ffffff;
      --card-border: rgba(29, 29, 31, 0.18); /* ชัดขึ้นเพื่อแยกขอบจากพื้น */
      --gold: #b01038;          /* แดงเข้มขึ้นเล็กน้อย · contrast กับพื้นขาวดีขึ้น */
      --gold-dim: #8c0c2c;
      --accent: #1d1d1f;
      --accent-soft: #374151;
      --text: #111827;           /* ใกล้ดำ · อ่านง่ายบนพื้นอ่อน */
      --text-dim: #4b5563;      /* อย่างน้อย ~4.5:1 บน #f3f4f6 */
      --success: #0f766e;
      --success-on: #ffffff;
      --danger: #b01038;
      --radius: 20px;
      --shadow: 0 16px 40px rgba(29, 29, 31, 0.10);
      --glow-1: rgba(176, 16, 56, 0.12);
      --glow-2: rgba(29, 29, 31, 0.05);
      --speech-bg: #fff5f7;
      --speech-border: #e8a0b0;
      --avatar-bg: #ffffff;
      --avatar-ring: rgba(176, 16, 56, 0.22);
      --btn-primary-text: #ffffff;
      --btn-primary-end: #8c0c2c;
      --chip-selected-bg: #fde8ee;
      --progress-track: #d1d5db;
      --controls-bg: #ffffff;
      --priority-bg: linear-gradient(135deg, #fff1f4, #ffffff);
      --priority-border: #e8a0b0;
      --priority-label: #b01038;
      --solve-bg: #ecfdf8;
      --solve-border: #5eead4;
      --solve-title: #0f766e;
      --hook-grad-end: #b01038;
      --muted-surface: #eef0f3;
      --on-muted: #111827;
      --theme-name: "aia";
    }

    /* ===== Theme: Classic เดิม (ทอง + cyan · เก็บไว้สลับกลับ) ===== */
    [data-theme="classic"] {
      --bg: #0b0f1a;
      --card: rgba(255,255,255,0.08);
      --card-border: rgba(255,255,255,0.22);
      --gold: #f5c518;
      --gold-dim: #e0b000;
      --accent: #22d3ee;
      --accent-soft: #67e8f9;
      --text: #f8fafc;
      --text-dim: #cbd5e1;       /* สว่างขึ้น · อ่านง่ายบนพื้นมืด */
      --success: #34d399;
      --success-on: #052e1c;
      --danger: #f87171;
      --radius: 20px;
      --shadow: 0 20px 40px rgba(0,0,0,0.4);
      --glow-1: rgba(245,197,24,0.14);
      --glow-2: rgba(34,211,238,0.10);
      --speech-bg: rgba(34,211,238,0.12);
      --speech-border: rgba(103,232,249,0.45);
      --avatar-bg: #1a2035;
      --avatar-ring: rgba(245,197,24,0.28);
      --btn-primary-text: #111111;
      --btn-primary-end: #e6a800;
      --chip-selected-bg: rgba(245,197,24,0.22);
      --progress-track: rgba(255,255,255,0.16);
      --controls-bg: rgba(15,20,35,0.92);
      --priority-bg: linear-gradient(135deg, rgba(239,68,68,0.28), rgba(245,197,24,0.16));
      --priority-border: rgba(252,165,165,0.55);
      --priority-label: #fecaca;
      --solve-bg: rgba(16,185,129,0.14);
      --solve-border: rgba(52,211,153,0.45);
      --solve-title: #6ee7b7;
      --hook-grad-end: #f5c518;
      --muted-surface: rgba(255,255,255,0.08);
      --on-muted: #f8fafc;
      --theme-name: "classic";
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      height: 100%;
      font-family: 'Noto Sans Thai', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      line-height: 1.5;
    }
    /* ===== Accessibility: โฟกัสชัด · ห้ามตัวอักษรกลืนพื้น ===== */
    :focus { outline: none; }
    :focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 3px;
    }
    button:focus-visible,
    .chip:focus-visible,
    .path-chip:focus-visible,
    input:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 2px;
    }
    ::selection {
      background: var(--gold);
      color: var(--btn-primary-text);
    }
    body {
      background:
        radial-gradient(ellipse at 20% 0%, var(--glow-1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, var(--glow-2) 0%, transparent 50%),
        var(--bg);
      min-height: 100dvh;
    }

    /* ===== Layout ===== */
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Progress */
    .progress-wrap {
      position: sticky;
      top: 0;
      z-index: 50;
      background: color-mix(in srgb, var(--bg) 90%, transparent);
      backdrop-filter: blur(12px);
      padding: 12px 20px 8px;
      border-bottom: 1px solid var(--card-border);
    }
    .progress-bar {
      height: 6px;
      background: var(--progress-track);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold-dim));
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.22,1,0.36,1);
      width: 0%;
    }
    [data-theme="classic"] .progress-fill {
      background: linear-gradient(90deg, var(--gold), var(--accent));
    }
    .progress-text {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 6px;
    }

    /* Avatar Zone */
    .avatar-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 20px 8px;
      position: relative;
    }
    .avatar-container {
      position: relative;
      width: 120px;
      height: 120px;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--gold);
      box-shadow: 0 0 0 4px var(--avatar-ring), 0 10px 30px rgba(0,0,0,0.12);
      transition: all 0.3s ease;
      background: var(--avatar-bg);
      display: block;
    }
    /* Video avatar keeps the same circular crop as image */
    video.avatar {
      object-fit: cover;
      object-position: center center;
      -webkit-mask-image: -webkit-radial-gradient(white, black); /* Safari circular clip fix */
    }
    /* ปุ่ม Play ทับวิดีโอวงกลม — รู้ว่ากดแล้วคลิปจะเล่น */
    .avatar-play {
      position: absolute;
      inset: 0;
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(17, 24, 39, 0.48);
      z-index: 3;
      transition: background 0.2s, transform 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .avatar-play.show { display: flex; }
    .avatar-play:hover { background: rgba(17, 24, 39, 0.58); }
    .avatar-play-circle {
      border: 2px solid rgba(255,255,255,0.95);
    }
    .avatar-play:active { transform: scale(0.96); }
    .avatar-play-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: play-pulse 1.8s ease-in-out infinite;
      border: 2px solid #ffffff;
    }
    .landing-avatar .avatar-play-circle {
      width: 58px;
      height: 58px;
    }
    .avatar-play-triangle {
      width: 0;
      height: 0;
      margin-left: 4px;
      border-style: solid;
      border-width: 10px 0 10px 16px;
      border-color: transparent transparent transparent var(--btn-primary-text);
    }
    .landing-avatar .avatar-play-triangle {
      border-width: 11px 0 11px 18px;
    }
    @keyframes play-pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 6px 20px rgba(0,0,0,0.2), 0 0 0 0 var(--glow-1); }
      50% { transform: scale(1.06); box-shadow: 0 8px 24px rgba(0,0,0,0.25), 0 0 0 10px transparent; }
    }
    .avatar-play-hint {
      position: absolute;
      left: 50%;
      bottom: -26px;
      transform: translateX(-50%);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 99px;
      padding: 3px 10px;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .avatar-play.show ~ .avatar-play-hint,
    .avatar-container:has(.avatar-play.show) .avatar-play-hint { opacity: 1; }
    .avatar-play-hint { opacity: 0; transition: opacity 0.2s; }
    .avatar-container.has-play .avatar-play-hint { opacity: 1; }

    /* ซ่อนปุ่ม/ตัวเลือกจนกว่าจะฟังคลิปจบ */
    .step-actions.is-hidden {
      display: none !important;
    }
    .step-actions {
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: fadeUp 0.45s ease both;
    }
    .listen-hint {
      text-align: center;
      font-size: 13px;
      color: var(--gold);
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--speech-bg);
      border: 1px dashed var(--speech-border);
      animation: fadeUp 0.4s ease both;
    }
    .listen-hint.is-hidden { display: none !important; }

    .avatar.speaking {
      border-color: var(--gold);
      box-shadow: 0 0 0 6px var(--avatar-ring), 0 0 28px var(--glow-1);
      transform: scale(1.05);
      animation: pulse-speak 1.2s ease-in-out infinite;
    }
    @keyframes pulse-speak {
      0%, 100% { box-shadow: 0 0 0 6px var(--avatar-ring), 0 0 24px var(--glow-1); }
      50% { box-shadow: 0 0 0 10px transparent, 0 0 36px var(--glow-1); }
    }
    .speaking-badge {
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gold);
      color: var(--btn-primary-text);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 99px;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    .avatar.speaking + .speaking-badge { opacity: 1; }
    .advisor-name {
      margin-top: 10px;
      font-size: 14px;
      font-weight: 600;
      color: var(--gold);
    }
    .advisor-role {
      font-size: 11px;
      color: var(--text-dim);
    }
    .meeting-hint {
      margin-top: 4px;
      font-size: 11px;
      color: var(--gold);
      opacity: 0.95;
    }

    /* Main Content */
    .content {
      flex: 1;
      padding: 8px 20px 120px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      animation: fadeUp 0.45s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hook-title {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.3;
      text-align: center;
      color: var(--text);
      margin-bottom: 8px;
    }
    [data-theme="classic"] .hook-title {
      background: linear-gradient(135deg, #fff 30%, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hook-sub {
      text-align: center;
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 20px;
    }

    .speech-bubble {
      background: var(--speech-bg);
      border: 1px solid var(--speech-border);
      border-radius: 16px 16px 16px 4px;
      padding: 14px 16px;
      font-size: 15px;
      line-height: 1.55;
      position: relative;
      margin-bottom: 4px;
    }
    .speech-bubble::before {
      content: '';
      position: absolute;
      left: -8px;
      top: 16px;
      border: 8px solid transparent;
      border-right-color: var(--speech-border);
    }

    .question {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      text-align: center;
      line-height: 1.4;
    }
    .hint {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 12px;
    }

    /* Buttons & Controls */
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .btn-grid.one { grid-template-columns: 1fr; }
    .btn-grid.three { grid-template-columns: 1fr 1fr 1fr; }

    .btn {
      appearance: none;
      border: 1.5px solid var(--card-border);
      background: var(--card);
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 12px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .btn:active { transform: scale(0.97); }
    .btn:hover, .btn.selected {
      border-color: var(--gold);
      background: var(--chip-selected-bg);
      color: var(--gold);
      box-shadow: 0 0 0 3px var(--avatar-ring);
    }
    .btn.primary {
      background: linear-gradient(135deg, var(--gold), var(--btn-primary-end));
      color: var(--btn-primary-text);
      border: none;
      font-weight: 700;
      font-size: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px var(--glow-1);
    }
    .btn.primary:hover { filter: brightness(1.08); }
    .btn.ghost {
      background: var(--muted-surface);
      border: 1.5px solid var(--card-border);
      color: var(--text);
      font-size: 13px;
      padding: 10px;
    }
    .btn.ghost:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--chip-selected-bg);
    }
    .btn:disabled, .btn.waiting {
      opacity: 1;
      cursor: not-allowed;
      transform: none !important;
      filter: none !important;
      background: var(--muted-surface) !important;
      color: var(--text-dim) !important;
      border-color: var(--card-border) !important;
      box-shadow: none !important;
    }

    /* Chips multi-select */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .chip {
      padding: 10px 16px;
      border-radius: 99px;
      border: 1.5px solid var(--card-border);
      background: var(--card);
      color: var(--text);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .chip.selected {
      background: var(--chip-selected-bg);
      border-color: var(--gold);
      color: var(--gold);
    }

    /* Slider */
    .slider-wrap {
      margin: 12px 0 8px;
    }
    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .slider-value {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      color: var(--gold);
      margin: 8px 0 12px;
      letter-spacing: -0.5px;
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 99px;
      background: var(--progress-track);
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--btn-primary-end));
      cursor: pointer;
      box-shadow: 0 2px 10px var(--glow-1);
      border: 3px solid #fff;
    }

    /* Big number result */
    .big-number {
      font-size: 42px;
      font-weight: 800;
      text-align: center;
      color: var(--gold);
      line-height: 1.1;
      margin: 8px 0;
    }
    .big-label {
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }

    /* Pyramid — โครงตาม Assure Wealth Financial Pyramid */
    .pyramid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      margin: 16px 0 8px;
    }
    .pyr-level {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-size: 11px;
      font-weight: 800;
      border-radius: 8px;
      color: #111827;
      transition: all 0.4s;
      opacity: 0.78; /* ห้ามจางเกินจนอ่านไม่ออก */
      text-align: center;
      padding: 6px 8px;
      line-height: 1.25;
      border: 1px solid rgba(17, 24, 39, 0.12);
      text-shadow: none;
    }
    .pyr-level small {
      display: block;
      font-size: 10px;
      font-weight: 600;
      opacity: 0.95;
      margin-top: 2px;
      color: inherit;
    }
    .pyr-level.active {
      opacity: 1;
      transform: scale(1.02);
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      border-color: rgba(17, 24, 39, 0.2);
    }
    /* ชั้นพีระมิด: ตัวอักษรเข้มบนพื้นสว่าง / ขาวบนพื้นเข้ม */
    .pyr-level.l4 { width: 52%; background: linear-gradient(135deg, #fde68a, #f59e0b); color: #111827; }
    .pyr-level.l3 { width: 68%; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #ffffff; }
    .pyr-level.l2 { width: 84%; background: linear-gradient(135deg, #86efac, #16a34a); color: #052e16; }
    .pyr-base {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }
    .pyr-base .pyr-level { width: 100%; min-height: 48px; }
    .pyr-level.l1a { background: linear-gradient(135deg, #67e8f9, #0891b2); color: #083344; }
    .pyr-level.l1b { background: linear-gradient(135deg, #a78bfa, #6d28d9); color: #ffffff; }
    .pyr-level.pyr-highlight {
      box-shadow: 0 0 0 2px var(--gold), 0 6px 18px var(--glow-1);
      transform: scale(1.04);
    }
    .pyr-level.pyr-highlight.active {
      box-shadow: 0 0 0 2px var(--gold), 0 8px 22px var(--glow-1);
    }

    /* Result cards */
    .result-grid {
      display: grid;
      gap: 10px;
    }
    .result-item {
      background: var(--muted-surface);
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border: 1.5px solid var(--card-border);
    }
    .result-item .label { font-size: 13px; color: var(--text-dim); font-weight: 700; }
    .result-item .value { font-weight: 800; color: var(--gold); font-size: 15px; text-align: right; }

    /* Priority badge */
    .priority {
      background: var(--priority-bg);
      border: 1px solid var(--priority-border);
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      margin: 12px 0;
    }
    .priority-title {
      font-size: 12px;
      color: var(--priority-label);
      font-weight: 600;
      margin-bottom: 4px;
    }
    .priority-main {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
    }
    .priority-gap {
      margin-top: 8px;
      font-size: 13px;
      color: var(--gold);
      font-weight: 600;
    }
    .solve-card {
      background: var(--solve-bg);
      border: 1px solid var(--solve-border);
      border-radius: 14px;
      padding: 16px;
    }
    .solve-card h3 {
      font-size: 14px;
      color: var(--solve-title);
      margin-bottom: 10px;
      font-weight: 700;
    }
    .solve-steps {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 0;
      margin: 0;
    }
    .solve-steps li {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 14px;

<body>

  <script>
    // ===================== DATA & STATE =====================
    const TOTAL_STEPS = 10;
    // DEV: ใส่ ?dev=1 ใน URL เพื่อข้ามคลิป / กด Next ได้ทันที (เฉพาะตอนพัฒนา)
    const DEV_MODE = new URLSearchParams(location.search).has('dev');
    // คลิปเสียงจริงทีละหน้า (lazy load) · duration วินาที (จากไฟล์) ใช้ปลดล็อกบน iOS/WebView
    const LANDING_CLIP = { src: 'avatar.mp4', duration: 26 };
    const STEP_CLIPS = {
      1: { src: 'media/01-age.mp4', poster: 'media/01-age.jpg', duration: 10 },
      2: { src: 'media/02-retire.mp4', poster: 'media/02-retire.jpg', duration: 23 },
      3: { src: 'media/03-prepared.mp4', poster: 'media/03-prepared.jpg', duration: 10 },
      4: { src: 'media/04-family.mp4', poster: 'media/04-family.jpg', duration: 16 },
      5: { src: 'media/05-goals.mp4', poster: 'media/05-goals.jpg', duration: 35 },
      6: { src: 'media/06-risks.mp4', poster: 'media/06-risks.jpg', duration: 21 },
      7: { src: 'media/07-pyramid.mp4', poster: 'media/07-pyramid.jpg', duration: 38 },
      8: { src: 'media/08-protect.mp4', poster: 'media/08-protect.jpg', duration: 27 },
      9: { src: 'media/09-invest.mp4', poster: 'media/09-invest.jpg', duration: 48 },
      10: { src: 'media/10-summary.mp4', poster: 'media/10-summary.jpg', duration: 40 },
    };
    let state = {
      step: 0,
      muted: false,
      speaking: false,
      introPlayed: false,
      stepHeard: {}, // step -> true หลังฟังจบอย่างน้อย 1 ครั้ง
      answers: {
        age: 35,
        retireAge: 60,
        monthlySpend: 30000,
        prepared: 0,
        careParents: null,
        hasSpouse: null,
        kids: 0,
        kidsAges: [],
        eduGoal: 'bachelor',
        goals: [],
        risks: [],
        monthlyExpense: 50000,
        efAmount: 0,
        hasHealth: null,
        hasLife: null,
        hasCI: null,
        hasAccident: null,
        riskTol: 'medium',
        topWorry: null
      }
    };

    // ตัวเลขแบบคนไทย: หมื่น / แสน / ล้าน (ไม่ใช้ "60 พัน")
    const fmt = (n) => new Intl.NumberFormat('th-TH').format(Math.round(Number(n) || 0));
    const _trimDec = (x) => {
      const r = Math.round(x * 10) / 10;
      return (r % 1 === 0) ? String(r) : r.toFixed(1);
    };
    const fmtM = (n) => {
      n = Math.round(Math.abs(Number(n) || 0));
      if (n === 0) return '0';
      if (n >= 1000000) return _trimDec(n / 1000000) + ' ล้าน';   // 1,000,000+
      if (n >= 100000)  return _trimDec(n / 100000) + ' แสน';    // 100,000–999,999
      if (n >= 10000)   return _trimDec(n / 10000) + ' หมื่น';    // 10,000–99,999
      if (n >= 1000)    return _trimDec(n / 1000) + ' พัน';      // 1,000–9,999 เท่านั้น
      return fmt(n);
    };
    // ใส่หน่วยบาทท้าย (ใช้โชว์เงิน)
    const fmtB = (n) => fmtM(n) + ' บาท';

    // เงินที่เตรียมไว้: สไลเดอร์ไม่เชิงเส้น — ช่วงต้นละเอียดทีละ 1 พัน (UX ดีกว่า step คงที่ 0–20 ล้าน)
    const PREP_SLIDER_MAX = 500;
    const PREP_AMOUNT_MAX = 20000000;
    function preparedFromSlider(i) {
      i = Math.max(0, Math.min(PREP_SLIDER_MAX, Math.round(Number(i) || 0)));
      if (i === 0) return 0;
      if (i <= 150) return i * 1000;                                   // 1 พัน – 1.5 แสน
      if (i <= 300) return 150000 + (i - 150) * 10000;                  // → ~1.65 ล้าน
      if (i <= 400) return 1650000 + (i - 300) * 50000;                 // → ~6.65 ล้าน
      return Math.min(
        PREP_AMOUNT_MAX,
        6650000 + (i - 400) * Math.round((PREP_AMOUNT_MAX - 6650000) / 100)
      );                                                               // → 20 ล้าน
    }
    function sliderFromPrepared(p) {
      p = Math.max(0, Math.round(Number(p) || 0));
      if (p <= 0) return 0;
      if (p <= 150000) return Math.min(150, Math.round(p / 1000));
      if (p <= 1650000) return 150 + Math.round((p - 150000) / 10000);
      if (p <= 6650000) return 300 + Math.round((p - 1650000) / 50000);
      if (p >= PREP_AMOUNT_MAX) return PREP_SLIDER_MAX;
      return Math.min(
        PREP_SLIDER_MAX,
        400 + Math.round((p - 6650000) / ((PREP_AMOUNT_MAX - 6650000) / 100))
      );
    }

    // เงินสำรองฉุกเฉิน: ช่วงต้นทีละ 1 พัน · สูงสุด 3 ล้าน
    const EF_SLIDER_MAX = 400;
    const EF_AMOUNT_MAX = 3000000;
    function efFromSlider(i) {
      i = Math.max(0, Math.min(EF_SLIDER_MAX, Math.round(Number(i) || 0)));
      if (i === 0) return 0;
      if (i <= 150) return i * 1000;                                  // 1 พัน – 1.5 แสน
      if (i <= 300) return 150000 + (i - 150) * 10000;                 // → ~1.65 ล้าน
      return Math.min(
        EF_AMOUNT_MAX,
        1650000 + (i - 300) * Math.round((EF_AMOUNT_MAX - 1650000) / 100)
      );                                                              // → 3 ล้าน
    }
    function sliderFromEf(p) {
      p = Math.max(0, Math.round(Number(p) || 0));
      if (p <= 0) return 0;
      if (p <= 150000) return Math.min(150, Math.round(p / 1000));
      if (p <= 1650000) return 150 + Math.round((p - 150000) / 10000);
      if (p >= EF_AMOUNT_MAX) return EF_SLIDER_MAX;
      return Math.min(
        EF_SLIDER_MAX,
        300 + Math.round((p - 1650000) / ((EF_AMOUNT_MAX - 1650000) / 100))
      );
    }

    // ===================== AVATAR VIDEO + เสียงจริง =====================
    // iOS Safari / in-app WebView: มักไม่ยิง ended, currentTime เด้งกลับ 0 หลังจบ,
    // duration = Infinity, timeupdate ถูก throttle → ต้อง force unlock ด้วย wall-clock
    const _videoEndCleanups = new WeakMap();
    let _playbackGen = 0; // ยกเลิก callback ของคลิปเก่าเมื่อเปลี่ยนหน้า/เล่นใหม่

    function clearVideoEndHandlers(video) {
      if (!video) return;
      const fn = _videoEndCleanups.get(video);
      if (fn) {
        try { fn(); } catch (_) {}
        _videoEndCleanups.delete(video);
      }
      try { video.onended = null; } catch (_) {}
    }

    /** บังคับ playsinline ให้ iOS / WebView (attribute + property) */
    function prepareVideoEl(video) {
      if (!video) return;
      try {
        video.setAttribute('playsinline', '');
        video.setAttribute('webkit-playsinline', 'true');
        video.setAttribute('x5-playsinline', 'true');
        video.playsInline = true;
        video.disableRemotePlayback = true;
      } catch (_) {}
    }

    function safeSeek(video, t) {
      if (!video) return;
      try {
        if (video.readyState >= 1) video.currentTime = t;
      } catch (_) {}
    }

    function mediaDuration(video, expected) {
      const d = video && video.duration;
      if (d && isFinite(d) && d > 0 && d < 3600) return d;
      if (expected && expected > 0) return expected;
      return 0;
    }

    /**
     * ตรวจจบคลิปแบบทน iOS/WebView — ใช้ร่วมทุกหน้า
     * @param {HTMLVideoElement} video
     * @param {function} onEnd
     * @param {{ expectedDuration?: number }} opts  expectedDuration วินาทีจากไฟล์จริง
     */
    function bindVideoEnd(video, onEnd, opts = {}) {
      if (!video) return () => {};
      clearVideoEndHandlers(video);
      let done = false;
      let maxT = 0;
      let playAccumMs = 0;
      let lastSample = Date.now();
      const sessionStart = Date.now();
      const expected = Number(opts.expectedDuration) || 0;
      let pollTimer = null;
      let hardTimer = null;

      const cleanup = () => {
        video.removeEventListener('ended', onEvent);
        video.removeEventListener('timeupdate', onEvent);
        video.removeEventListener('pause', onEvent);
        video.removeEventListener('playing', onEvent);
        video.removeEventListener('loadedmetadata', onEvent);
        video.removeEventListener('durationchange', onEvent);
        video.removeEventListener('webkitendfullscreen', onEvent);
        if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
        if (hardTimer) { clearTimeout(hardTimer); hardTimer = null; }
        _videoEndCleanups.delete(video);
      };

      const finish = () => {
        if (done) return;
        done = true;
        cleanup();
        try { onEnd(); } catch (_) {}
      };

      const check = () => {
        if (done) return;
        const now = Date.now();
        const dt = Math.min(1000, now - lastSample);
        lastSample = now;

        // นับเวลาที่เล่นจริง (หยุดนับตอน pause / ซ่อนแท็บ)
        const advancing = !video.paused && !video.ended && !document.hidden;
        if (advancing) playAccumMs += dt;

        const t = Number(video.currentTime) || 0;
        if (t > maxT) maxT = t;

        if (video.ended) return finish();

        const d = mediaDuration(video, expected);

        // ใกล้จบตาม currentTime
        if (d > 0 && t >= d - 0.55 && (t > 0.05 || maxT > 0.05)) return finish();

        // iOS คลาสสิก: จบแล้ว pause + รีเซ็ต currentTime กลับ 0
        if (video.paused && maxT >= 0.8 && t < 0.2) {
          if (d > 0 && maxT >= d * 0.72) return finish();
          if (!d && expected > 0 && maxT >= expected * 0.72) return finish();
          // pause กลางคลิป — ยังไม่จบ
        }

        // เล่นครบตามเวลาที่สะสม (แม้ currentTime พัง)
        if (d > 0 && playAccumMs >= (d - 0.35) * 1000 && maxT >= Math.min(0.5, d * 0.05)) {
          return finish();
        }
        // currentTime พังทั้งก้อน แต่เสียงเล่นครบตาม expected
        if (d > 0 && playAccumMs >= (d + 0.6) * 1000) return finish();

        // hard wall-clock จากเริ่ม session — ปลดล็อกเสมอ ห้ามค้าง
        const hardMs = ((d || expected || 40) + 3.5) * 1000;
        if (now - sessionStart >= hardMs) return finish();
      };

      const onEvent = () => check();

      video.addEventListener('ended', onEvent);
      video.addEventListener('timeupdate', onEvent);
      video.addEventListener('pause', onEvent);
      video.addEventListener('playing', onEvent);
      video.addEventListener('loadedmetadata', onEvent);
      video.addEventListener('durationchange', onEvent);
      video.addEventListener('webkitendfullscreen', onEvent);
      pollTimer = setInterval(check, 200);

      // hard timer สำรอง (แม้ interval ถูก throttle ใน background tab)
      const hardMs = ((expected || 40) + 4) * 1000;
      hardTimer = setTimeout(() => finish(), hardMs);

      _videoEndCleanups.set(video, cleanup);
      return cleanup;
    }

    /** รอ media พร้อมก่อน play — Safari มัก fail ถ้า play() ทันทีหลัง src/load() */
    function playWhenReady(video) {
      if (!video) return Promise.reject(new Error('no video'));
      prepareVideoEl(video);
      const tryPlay = () => {
        const p = video.play();
        return (p && typeof p.then === 'function') ? p : Promise.resolve();
      };
      if (video.readyState >= 2) return tryPlay();
      return new Promise((resolve, reject) => {
        let settled = false;
        const settle = (fn) => {
          if (settled) return;
          settled = true;
          video.removeEventListener('canplay', onReady);
          video.removeEventListener('loadeddata', onReady);
          video.removeEventListener('error', onErr);
          clearTimeout(timer);
          fn();
        };
        const onReady = () => settle(() => tryPlay().then(resolve, reject));
        const onErr = () => settle(() => reject(new Error('media error')));
        const timer = setTimeout(() => settle(() => tryPlay().then(resolve, reject)), 3500);
        video.addEventListener('canplay', onReady);
        video.addEventListener('loadeddata', onReady);
        video.addEventListener('error', onErr);
      });
    }

    /** seek แล้วรอ seeked เล็กน้อย (iOS) แล้วค่อย play */
    function seekThenPlay(video, t) {
      prepareVideoEl(video);
      return new Promise((resolve, reject) => {
        let done = false;
        const go = () => {
          if (done) return;
          done = true;
          video.removeEventListener('seeked', onSeeked);
          clearTimeout(timer);
          playWhenReady(video).then(resolve, reject);
        };
        const onSeeked = () => go();
        const cur = Number(video.currentTime) || 0;
        if (video.readyState < 1 || Math.abs(cur - t) < 0.08) {
          playWhenReady(video).then(resolve, reject);
          return;
        }
        video.addEventListener('seeked', onSeeked);
        safeSeek(video, t);
        const timer = setTimeout(go, 400);
      });
    }

    /**
     * เล่นคลิปเสียงจริงครั้งหนึ่ง แล้วเรียก onDone — ใช้ร่วม landing + ทุกขั้น
     * onDone ถูกเรียกแน่นอนเมื่อจบ (หรือ hard timeout) ถ้า session ยัง active
     */
    function playClipOnce(video, opts = {}) {
      const gen = ++_playbackGen;
      const stillActive = () => gen === _playbackGen && (!opts.isActive || opts.isActive());
      const expected = Number(opts.expectedDuration) || 0;

      let finished = false;
      const finish = (reason) => {
        if (finished) return;
        finished = true;
        if (!stillActive()) return;
        state.speaking = false;
        try { if (opts.onDone) opts.onDone(reason); } catch (_) {}
      };

      prepareVideoEl(video);
      clearVideoEndHandlers(video);
      try { video.pause(); } catch (_) {}
      video.loop = false;
      video.muted = !!opts.muted;
      // ปิด controls / กัน iOS เด้ง fullscreen
      try { video.controls = false; video.removeAttribute('controls'); } catch (_) {}
      if (opts.speakingClass !== false) video.classList.add('speaking');
      state.speaking = true;
      bindVideoEnd(video, () => finish('ended'), { expectedDuration: expected });

      const kickoff = () => seekThenPlay(video, opts.seekTo != null ? opts.seekTo : 0);

      const p = (video.readyState >= 1)
        ? kickoff()
        : new Promise((resolve, reject) => {
            let started = false;
            const start = () => {
              if (started) return;
              started = true;
              video.removeEventListener('loadedmetadata', onMeta);
              video.removeEventListener('loadeddata', onMeta);
              clearTimeout(timer);
              kickoff().then(resolve, reject);
            };
            const onMeta = () => start();
            video.addEventListener('loadedmetadata', onMeta);
            video.addEventListener('loadeddata', onMeta);
            const timer = setTimeout(start, 2200);
          });

      p.then(() => {
        if (!stillActive() || finished) return;
        if (opts.onPlaying) opts.onPlaying();
        // ถ้าเล่นแล้วแต่ currentTime ไม่ขยับใน 6 วิ → โชว์ปุ่ม play ให้กดใหม่ (ไม่ปลดล็อกขั้น)
        setTimeout(() => {
          if (finished || !stillActive()) return;
          const t = Number(video.currentTime) || 0;
          if (t < 0.15 && video.paused) {
            if (opts.onPlayFailed) opts.onPlayFailed();
          } else if (t < 0.15 && !video.paused) {
            // บาง WebView รายงาน playing แต่หัวไม่เดิน — ยังรอ hard timeout
          }
        }, 6000);
      }).catch(() => {
        if (finished || !stillActive()) return;
        clearVideoEndHandlers(video);
        try { video.pause(); } catch (_) {}
        video.classList.remove('speaking');
        state.speaking = false;
        // สำคัญ: อย่าค้าง "กำลังฟัง" — ให้ UI กดเล่นใหม่ได้
        if (opts.onPlayFailed) opts.onPlayFailed();
      });

      return {
        gen,
        cancel() {
          if (gen === _playbackGen) _playbackGen++;
          clearVideoEndHandlers(video);
        }
      };
    }

    function ensureAvatarPlaying() {
      const av = document.getElementById('avatar');
      if (STEP_CLIPS[state.step]) return;
      if (av && av.tagName === 'VIDEO') {
        clearVideoEndHandlers(av);
        prepareVideoEl(av);
        av.muted = true;
        av.loop = true;
        safeSeek(av, 0);
        av.play().catch(() => {});
      }
    }

    function startSilentLoop(video) {
      if (!video) return;
      clearVideoEndHandlers(video);
      prepareVideoEl(video);
      video.loop = true;
      video.muted = true;
      video.classList.remove('speaking');
      // iOS: หลังจบ currentTime อาจเป็น duration — ต้อง seek ก่อน loop
      safeSeek(video, 0);
      const p = video.play();
      if (p && p.catch) p.catch(() => {});
      state.speaking = false;
      const skip = document.getElementById('btnSkip');
      if (skip) skip.style.display = 'none';
    }

    /**
     * หน้าจบแบบครูสอน: ชี้ปัญหา → วิธีแก้เป็นขั้น
     * อ้างอิง flow นาทีท้ายคลิป Timeline of Life (เลือกเรื่องสำคัญ → ลงรายละเอียด)
     */
    function buildPriorityPlan(a) {
      const efNeed3 = a.monthlyExpense * 3;
      const efNeed6 = a.monthlyExpense * 6;
      const efGap = Math.max(efNeed3 - (a.efAmount || 0), 0);
      const retireGap = Math.max((a._totalNeed || 0) - (a.prepared || 0), 0);
      const hasKids = (a.kids || 0) > 0;
      const insWeak = a.hasHealth === false || a.hasLife === false || a.hasHealth == null || a.hasLife == null;
      const risks = (a.risks || []).filter(r => r !== 'none');
      const worryJob = risks.some(r => r === 'job' || r === 'tech');
      const worryHealth = risks.some(r => r === 'illness' || r === 'accident');

      // ลำดับตามฐานพีระมิดก่อน แล้วค่อยเป้าหมาย (แบบครู: ฐานไม่แน่นพังทั้งก้อน)
      if (efGap > a.monthlyExpense * 0.5) {
        return {
          id: 'ef',
          title: 'เงินสำรองฉุกเฉินยังไม่พอ',
          gap: `ยังขาดประมาณ ${fmtM(efGap)} เพื่อให้ถึง 3 เดือน`,
          reason: 'ถ้ารายได้สะดุด — งานเปลี่ยน AI เศรษฐกิจ — ไม่มีเงินฉุกเฉินดึงใช้ทันที แผนอื่นก็เดินต่อยาก',
          steps: [
            `ตั้งเป้าเงินฉุกเฉิน ${fmtM(efNeed3)} – ${fmtM(efNeed6)} (3–6 เท่าค่าใช้จ่าย)`,
            'แยกบัญชี อย่าเอาไปลงทุนเสี่ยง — ต้องถอนใช้ได้ทันที',
            'เติมทีละเดือนจนครบ ก่อนเร่งลงทุนชั้นบน'
          ]
        };
      }
      if (insWeak || worryHealth) {
        return {
          id: 'risk',
          title: 'บริหารความเสี่ยงยังไม่ครบ',
          gap: 'ความคุ้มครองพื้นฐานยังไม่ครบ',
          reason: 'เจ็บป่วย ทุพพลภาพ หรือเหตุไม่คาดคิด ทำให้แผนบ้าน ลูก เกษียณพังได้ทั้งก้อน',
          steps: [
            'เช็คสิทธิ์ที่มีอยู่ก่อน: ประกันสังคม / กลุ่ม / บัตรทอง / ข้าราชการ',
            'เติมช่องว่าง: สุขภาพ–โรคร้ายแรง · ชีวิต · อุบัติเหตุ ตามความจำเป็น',
            'คุยรายละเอียดวงเงินกับนักวิเคราะห์แผน — อย่าซื้อของก่อนรู้ช่องว่าง'
          ]
        };
      }
      if (worryJob && insWeak) {
        return {
          id: 'income',
          title: 'คุ้มครองรายได้ครอบครัว',
          gap: 'กังวลงาน/รายได้สะดุด แต่ความคุ้มครองยังไม่ชัด',
          reason: 'AI หรือเศรษฐกิจอาจกระทบรายได้ — ต้องรู้ว่าครอบครัวอยู่ได้กี่ปีถ้าเกิดเหตุ',
          steps: [
            'รวมภาระหนี้ + ค่าใช้จ่ายครอบครัว + ค่าเรียนบุตร (ถ้ามี)',
            'คำนวณทุนคุ้มครองรายได้ที่จำเป็นจริง',

          ]
        };
      }
      if (hasKids) {
        return {
          id: 'kids',
          title: 'กองทุนการศึกษาบุตร',
          gap: `มีบุตร ${a.kids} คน — ควรวางแผนให้ชัด`,
          reason: 'เป้าหมายลูกมักใหญ่และมี deadline — ยิ่งเริ่มช้า ยิ่งต้องเติมแรง',
          steps: [
            'ล็อกเป้าหมายเรียน: รัฐ / เอกชน / นานาชาติ และระดับจบ',
            'ดูอายุลูกและจำนวนปีที่เหลือ',
            'เลือกกองทุน/แผนที่การันตีการศึกษาได้ แม้เกิดเหตุกับผู้ปกครอง'
          ]
        };
      }
      if (retireGap > 1000000) {
        return {
          id: 'retire',
          title: 'ช่องว่างเงินเกษียณ',

          reason: `อยากใช้ ${fmt(a.monthlySpend)} บาท/เดือน หลังเกษียณอายุ ${a.retireAge} — วันนี้ยังไม่ครบ`,
          steps: [
            `ทบทวนเป้า: เกษียณ ${a.retireAge} ปี · ใช้ ${fmt(a.monthlySpend)} บาท/เดือน`,
            `ดูช่องว่าง ${fmtM(retireGap)} แล้วแบ่งเติมรายเดือน/ปี`,

          ]
        };
      }
      return {
        id: 'invest',
        title: 'เริ่มออม–ลงทุนอย่างเป็นระบบ',
        gap: 'ฐานพอเดินได้ — ถึงเวลาชั้นกลางของพีระมิด',
        reason: 'มีฐานแล้ว ถ้ายังไม่จัดระเบียบออม/ลงทุน เงินจะไม่ทำงาน',
        steps: [
          'แยกเป้าสั้น กลาง ยาว (1–3 / 3–7 / 7+ ปี)',
          `เลือกระดับความเสี่ยงที่รับได้ (ตอนนี้เลือก: ${a.riskTol === 'low' ? 'ต่ำ' : a.riskTol === 'high' ? 'สูง' : 'ปานกลาง'})`,
          'จัดสัดส่วนและทบทวนปีละครั้ง — ชั้นบน (มรดก) ค่อยคิดเมื่อพร้อม'
        ]
      };
    }

    /**
     * เกต UX: ฟังคลิปก่อน → ค่อยโชว์ปุ่ม/สไลด์ + ปลด next
     * ใช้กับทุกขั้นที่มีคลิป (1–10)
     * @param {number} step
     * @param {{ nextLabel: string, onNext: function, wireActions?: function }} opts
     */
    function gateStepWithClip(step, opts) {
      const already = !!state.stepHeard[step] || DEV_MODE;
      let unlocked = already;
      const clip = STEP_CLIPS[step];
      const expectSec = (clip && clip.duration) || 30;

      // เคลียร์ failsafe เก่า
      if (state._gateFailsafe) {
        clearTimeout(state._gateFailsafe);
        state._gateFailsafe = null;
      }

      const reveal = () => {
        if (state.step !== step) return;
        if (state._gateFailsafe) {
          clearTimeout(state._gateFailsafe);
          state._gateFailsafe = null;
        }
        const first = !unlocked;
        unlocked = true;
        state.stepHeard[step] = true;
        setStepActionsVisible(true);
        if (first && typeof opts.wireActions === 'function') opts.wireActions();
        showBottom(opts.nextLabel, () => {
          if (!state.stepHeard[step] || state.step !== step) return;
          stopSpeak();
          opts.onNext();
        });
        btnNext.disabled = false;
        btnNext.classList.remove('waiting');
        const skip = document.getElementById('btnSkip');
        if (skip && !state.speaking) skip.style.display = 'none';
      };

      state._stepReveal = reveal;
      state._stepRevealStep = step;

      if (already) {
        setStepActionsVisible(true);
        if (typeof opts.wireActions === 'function') opts.wireActions();
        showBottom(opts.nextLabel, () => {
          stopSpeak();
          opts.onNext();
        });
        btnNext.disabled = false;
        btnNext.classList.remove('waiting');
        playStepClip(step, { silentIfHeard: !DEV_MODE && !!state.stepHeard[step], onDone: () => {} });
        if (DEV_MODE) {
          stopSpeak();
          startSilentLoop(document.getElementById('avatar'));
        }
      } else {
        setStepActionsVisible(false);
        // ปุ่มล่าง: ระหว่างฟังกดไม่ได้ — แต่ failsafe จะปลดแน่นอน
        showBottom('กำลังฟัง... 🎧', () => {
          // ถ้า user เค้นกด: หลัง 40% ของคลิป อนุญาตข้าม (กันค้าง WebView)
          // (ยัง disabled ตอนแรก — เปิดทีหลังด้วย failsafe partial)
        });
        btnNext.disabled = true;
        btnNext.classList.add('waiting');
        playStepClip(step, { onDone: reveal });

        // ชั้น 2: ถ้า video event พังทั้งหมด ยังปลดล็อก UI หลัง duration+5s
        state._gateFailsafe = setTimeout(() => {
          if (state.step !== step || unlocked) return;
          try { stopSpeak(); } catch (_) {}
          reveal();
        }, (expectSec + 5) * 1000);

        // ชั้น 3: หลัง 70% เปิดปุ่ม "ข้ามไปทำต่อ" กันค้าง WebView
        setTimeout(() => {
          if (state.step !== step || unlocked) return;
          btnNext.disabled = false;
          btnNext.classList.remove('waiting');
          showBottom('ข้ามไปทำต่อ →', () => {
            if (state.step !== step || unlocked) return;
            try { stopSpeak(); } catch (_) {}
            reveal();
          });
          showZonePlay(true);
        }, Math.max(4000, expectSec * 0.7 * 1000));
      }

      const zoneBtn = document.getElementById('zonePlayBtn');
      if (zoneBtn) {
        zoneBtn.onclick = () => {
          if (state.step !== step) return;
          state.muted = false;
          document.getElementById('btnMute').textContent = '🔊';
          playStepClip(step, { onDone: reveal });
        };
      }
    }

    function playStepClip(step, opts = {}) {
      const clip = STEP_CLIPS[step];
      const av = document.getElementById('avatar');
      if (!clip || !av) {
        ensureAvatarPlaying();
        if (opts.onDone) opts.onDone();
        return;
      }

      prepareVideoEl(av);

      if (av.dataset.clipSrc !== clip.src) {
        clearVideoEndHandlers(av);
        av.dataset.clipSrc = clip.src;
        av.src = clip.src;
        if (clip.poster) av.poster = clip.poster;
        try { av.load(); } catch (_) {}
      }

      if (state.muted) {
        startSilentLoop(av);
        showZonePlay(true);
        return;
      }

      if (state.stepHeard[step] && opts.silentIfHeard) {
        startSilentLoop(av);
        showZonePlay(false);
        if (opts.onDone) opts.onDone();
        return;
      }

      document.getElementById('btnSkip').style.display = state.stepHeard[step] ? 'flex' : 'none';
      showZonePlay(false);

      playClipOnce(av, {
        expectedDuration: clip.duration || 30,
        isActive: () => state.step === step,
        onPlaying: () => {
          if (state.step === step) showZonePlay(false);
        },
        onPlayFailed: () => {
          if (state.step !== step) return;
          document.getElementById('btnSkip').style.display = 'none';
          showZonePlay(true);
          // อย่าค้างปุ่มล่าง disabled ถ้าเล่นไม่ติด — เปิดให้ข้ามได้
          if (!state.stepHeard[step]) {
            btnNext.disabled = false;
            btnNext.classList.remove('waiting');
            showBottom('เล่นไม่ติด · ไปต่อได้ →', () => {
              if (state.step !== step) return;
              if (typeof state._stepReveal === 'function' && state._stepRevealStep === step) {
                state._stepReveal();
              }
            });
          }
        },
        onDone: () => {
          if (state.step !== step) return;
          state.stepHeard[step] = true;
          startSilentLoop(av);
          showZonePlay(false);
          if (opts.onDone) opts.onDone();
        }
      });
    }

    /** อัปเดตปุ่มหลักหน้า Landing */
    function setLandingCTA(mode) {
      const btn = document.getElementById('startBtn');
      if (!btn) return;
      if (mode === 'ready') {
        btn.disabled = false;
        btn.textContent = state.introPlayed ? 'ไปต่อเลย →' : 'เริ่มดูกัน 🚀';
      } else if (mode === 'playing') {
        // iOS: อย่า disabled ถาวร — เปลี่ยนเป็นปุ่มที่กดซ้ำ/ข้ามได้หลัง timeout
        btn.disabled = false;
        btn.textContent = 'กำลังฟัง... 🎧';
      } else if (mode === 'skip') {
        btn.disabled = false;
        btn.textContent = 'ไปหน้าถัดไป →';
      }
    }

    /**
     * เล่นคลิปหน้าแรก (ปุ่ม Play / เริ่มดูกัน ใช้ตัวเดียวกัน)
     * - จบคลิป → ไปหน้าถัดไปอัตโนมัติ
     * - hard timeout / ปุ่มข้าม กันค้างบน iOS WebView
     */
    function playLandingVoice(video) {
      if (!video || state.step !== 0) return;
      // กำลังเล่นอยู่แล้ว — ไม่รีสตาร์ท (ยกเว้นค้าง paused)
      if (state.speaking && !video.paused && !video.muted) return;

      if (state.muted) {
        state.muted = false;
        document.getElementById('btnMute').textContent = '🔊';
      }

      prepareVideoEl(video);
      if (state._landingFailsafe) {
        clearTimeout(state._landingFailsafe);
        state._landingFailsafe = null;
      }

      let landingFinishing = false;
      const finishLanding = () => {
        if (state.step !== 0 || landingFinishing) return;
        landingFinishing = true;
        if (state._landingFailsafe) {
          clearTimeout(state._landingFailsafe);
          state._landingFailsafe = null;
        }
        state.introPlayed = true;
        state.speaking = false;
        showAvatarPlay(false);
        video.classList.remove('speaking');
        document.getElementById('btnSkip').style.display = 'none';
        setLandingCTA('ready');
        goTo(1);
      };

      document.getElementById('btnSkip').style.display = state.introPlayed ? 'flex' : 'none';
      showAvatarPlay(false);
      setLandingCTA('playing');

      // ระหว่างฟัง: กดซ้ำได้ — ค้าง/พัง = เล่นใหม่ · ครบ ~70% = ไปต่อ
      const startBtn = document.getElementById('startBtn');
      const playStartedAt = Date.now();
      if (startBtn) {
        startBtn.onclick = () => {
          if (state.step !== 0) return;
          if (state.introPlayed) {
            finishLanding();
            return;
          }
          const elapsed = (Date.now() - playStartedAt) / 1000;
          if (elapsed >= LANDING_CLIP.duration * 0.7) {
            try { video.pause(); } catch (_) {}
            clearVideoEndHandlers(video);
            finishLanding();
            return;
          }
          // คลิปค้าง/pause กลางทาง → เริ่มใหม่
          if (video.paused || !state.speaking) {
            playLandingVoice(video);
          }
        };
      }

      playClipOnce(video, {
        expectedDuration: LANDING_CLIP.duration,
        isActive: () => state.step === 0,
        onPlaying: () => {
          if (state.step === 0) showAvatarPlay(false);
        },
        onPlayFailed: () => {
          if (state.step !== 0) return;
          try { video.pause(); } catch (_) {}
          safeSeek(video, 0);
          video.muted = true;
          video.loop = false;
          video.classList.remove('speaking');
          document.getElementById('btnSkip').style.display = 'none';
          showAvatarPlay(true);
          setLandingCTA('ready');
          // ผูกปุ่มเริ่มใหม่
          const b = document.getElementById('startBtn');
          if (b) b.onclick = () => playLandingVoice(video);
        },
        onDone: () => finishLanding()
      });

      // failsafe สุดท้าย: ห้ามค้างเกิน duration+5s
      state._landingFailsafe = setTimeout(() => {
        if (state.step !== 0 || state.introPlayed) return;
        try { clearVideoEndHandlers(video); video.pause(); } catch (_) {}
        finishLanding();
      }, (LANDING_CLIP.duration + 5) * 1000);

      // หลัง 70% เปลี่ยนปุ่มเป็น "ไปหน้าถัดไป"
      setTimeout(() => {
        if (state.step !== 0 || state.introPlayed) return;
        setLandingCTA('skip');
      }, LANDING_CLIP.duration * 0.7 * 1000);
    }
